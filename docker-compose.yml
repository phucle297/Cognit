# docker-compose.yml — run the full stack with one command.
#
#   docker compose up              # server + persistent volume
#   docker compose run --rm cli    # one-shot CLI (pass subcommand as args)
#   docker compose down            # stop
#
# Data persists in the `cognit-data` named volume at /data inside the
# container (the server's COGNIT_ROOT). To inspect the DB from the
# host, use `docker compose run --rm cli session list`.

services:
  server:
    build:
      context: .
      args:
        APP_NAME: server
    image: cognit:server
    container_name: cognit-server
    ports:
      - "6971:6971"
    environment:
      COGNIT_ROOT: /data
      PORT: "6971"
    volumes:
      - cognit-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6971/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  cli:
    # One-shot CLI. Use as: `docker compose run --rm cli <subcommand> [args]`
    # e.g. `docker compose run --rm cli init`
    #      `docker compose run --rm cli session create "demo"`
    #      `docker compose run --rm cli observe "hello"`
    build:
      context: .
      args:
        APP_NAME: cli
    image: cognit:cli
    profiles: ["cli"]   # not started by `up`; use `run --rm` instead
    volumes:
      - cognit-data:/data
    environment:
      COGNIT_ROOT: /data
    entrypoint: ["cognit-entrypoint"]

volumes:
  cognit-data:
