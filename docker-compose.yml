# docker-compose.yml — Phase 6.8 one-line local deploy.
#
# Single-command entry point (CLI on host, server in Docker):
#
#   scripts/up.sh                     # installs + links CLI, starts server
#   docker compose up -d              # server-only path (CLI already linked)
#   cognit dashboard --docker         # on-demand dashboard (port 6970)
#   docker compose --profile dashboard up -d   # alternative: explicit profile
#
# Why `scripts/up.sh` instead of pure `docker compose up -d`:
# apps/cli depends on better-sqlite3, a native module. pnpm install
# inside this Alpine image produces the musl prebuild, which will not
# load on a glibc Linux host or on macOS. The wrapper runs the CLI
# install/build/link on the host (correct libc) and only the server
# in Docker. Plain `docker compose up -d` still works once the CLI is
# already linked on the host.
#
# Port policy:
#   - :6970 host-facing only (dashboard via nginx), started on demand
#   - :6971 internal docker network only; not exposed to host
#   - Non-docker users (pnpm dev:server + pnpm dev:dashboard) unaffected
#
# The dashboard service lives behind the `dashboard` profile so a plain
# `docker compose up` does not bind :6970. Start it explicitly via the
# CLI (`cognit dashboard --docker`) or the profile (`--profile dashboard`).
#
# Data persists in the `cognit-data` named volume at /data inside the
# server container (the server's COGNIT_ROOT). To wipe and re-seed:
#   docker compose down -v && docker compose up -d
#
# Local-only tool — no auth, no API token, no cookie. The server
# binds 0.0.0.0 inside the docker network but the port is never
# published to the host.

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: cognit:server
    container_name: cognit-server
    expose:
      - "6971"                       # internal docker network only
    environment:
      COGNIT_ROOT: /data
      PORT: "6971"
    volumes:
      - cognit-data:/data
    # seed-demo.mjs runs first; on re-runs the demo session already
    # exists so it exits 0 in <50ms.
    command: ["sh", "-c", "node apps/server/seed-demo.mjs && exec node apps/server/dist/index.js --host 0.0.0.0 --port 6971 --root /data"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6971/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    image: cognit:dashboard
    container_name: cognit-dashboard
    profiles: ["dashboard"]          # opt-in: only started by `cognit dashboard --docker` or `docker compose --profile dashboard up`
    ports:
      - "127.0.0.1:6970:6970"         # only host-facing port
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cognit-data: