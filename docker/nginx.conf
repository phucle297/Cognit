# docker/nginx.conf — Phase 6.8 dashboard reverse proxy.
#
# Serves the Vite build on :6970. Proxies all non-asset paths to
# the server container on :6971. SPA fallback: unknown routes hit
# `try_files ... @backend`, the @backend location forwards to the
# server which itself serves the dashboard's dist on GET / (same-origin
# mode). For actual API routes the @backend pass-through wins.
#
# SSE: /events/stream needs proxy_buffering off + a long read timeout
# (default 60s would chop long-lived streams).
#
# Local-only tool — no auth. There is no /auth/login route to
# exempt from a bearer gate; the location patterns below match
# pure API prefixes.

server {
  listen 6970;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Backend routes ────────────────────────────────────────────
  # Match the server's API surface (apps/server/src/index.ts:17-26).

  # Long-lived SSE — disable buffering, no cache, 24h read timeout.
  location = /events/stream {
    proxy_pass http://server:6971;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(healthz|health|events|sessions|projects|edges|verify|actors|knowledge-graph|decision-graph|verification|settings|storage|recovery)(/|$) {
    proxy_pass http://server:6971;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Static asset caching ──────────────────────────────────────
  # Vite emits hashed filenames under /assets/.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── SPA fallback ──────────────────────────────────────────────
  # Everything else resolves to the Vite dist's index.html so the
  # React Router can take over (e.g. /timeline, /knowledge-graph
  # page, /recovery). This location only serves GETs for static files.
  location / {
    try_files $uri $uri/ /index.html;
  }
}