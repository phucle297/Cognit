# docker/nginx.conf — Phase 6.8 dashboard reverse proxy.
#
# Serves the Vite build on :6970. Proxies all /api/* paths to
# the server container on :6971. SPA fallback: unknown routes
# resolve to the Vite dist's index.html so the React Router can
# take over (e.g. /timeline, /knowledge-graph, /recovery).
#
# SSE: /api/events/stream needs proxy_buffering off + a long read
# timeout (default 60s would chop long-lived streams).
#
# Local-only tool — no auth. The /api/* prefix is required since
# commit 020f8b2 (prefix all server routes with /api).

server {
  listen 6970;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Backend routes ────────────────────────────────────────────
  # Match the server's /api/* surface (apps/server/src/routes/*).

  # Long-lived SSE — disable buffering, no cache, 24h read timeout.
  location = /api/events/stream {
    proxy_pass http://server:6971;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Every other /api/* request: forward to the server.
  location /api/ {
    proxy_pass http://server:6971;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Static asset caching ──────────────────────────────────────
  # Vite emits hashed filenames under /assets/.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── SPA fallback ──────────────────────────────────────────────
  # Everything else resolves to the Vite dist's index.html so the
  # React Router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }
}